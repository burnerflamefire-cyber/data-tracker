<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Project Data Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- Config -->
  <script src="config/app.config.js"></script>

  <style>
    body { margin:0; font-family:system-ui; background:#f4f7fb; }

    .wc-blue { background:#002D5B; color:white; }

    .sidebar {
      transition: width 0.2s ease;
      overflow: hidden;
    }

    .collapsed { width:60px !important; }

    .btn {
      padding:8px;
      font-size:12px;
      border-radius:6px;
      text-align:left;
      cursor:pointer;
    }

    .btn:hover { background:#004A99; }

    .active { background:#004A99; }
  </style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen" class="fixed inset-0 flex items-center justify-center wc-blue text-white">
  Loading Project Data Tracker...
</div>

<!-- APP -->
<div id="app" class="hidden flex h-screen">

  <!-- LEFT NAV (LEVEL SWITCH) -->
  <div id="leftNav" class="sidebar wc-blue w-56 flex flex-col p-2">

    <button onclick="toggleLeftNav()" class="bg-white text-black text-xs p-1 rounded mb-3">
      ☰
    </button>

    <div class="text-xs opacity-70 mb-2">NAV LEVEL</div>

    <div onclick="setLevel('project')" id="btnProjectLevel" class="btn active">
      📁 Project Level
    </div>

    <div onclick="setLevel('programme')" id="btnProgrammeLevel" class="btn">
      🏢 Programme Level
    </div>

  </div>

  <!-- MODULE NAV -->
  <div id="moduleNav" class="wc-blue w-56 flex flex-col p-2 border-l border-blue-900">

    <div class="text-xs opacity-70 mb-2">MODULES</div>

    <div id="moduleList"></div>

  </div>

  <!-- CONTENT -->
  <div class="flex-1 flex flex-col">

    <!-- TOP BAR -->
    <div class="wc-blue p-2 text-sm flex justify-between">
      <div>Project Data Tracker</div>
      <div id="authStatus">Firebase: Initialising...</div>
    </div>

    <!-- PAGE CONTENT -->
    <div id="content" class="p-4 text-gray-700">
      Select a module
    </div>

  </div>
</div>

<!-- AUTH -->
<script src="auth/auth.firebase.js"></script>

<script>

let state = {
  level: "project"
};

const modules = {
  project: [
    { id: "overview", name: "Overview" },
    { id: "cashflow", name: "Cashflow" },
    { id: "costs", name: "Cost Tracking" }
  ],
  programme: [
    { id: "dashboard", name: "Programme Dashboard" },
    { id: "pipeline", name: "Pipeline View" }
  ]
};

// ---------------- UI HELPERS ----------------

function toggleLeftNav() {
  document.getElementById("leftNav").classList.toggle("collapsed");
}

function setLevel(level) {
  state.level = level;

  document.getElementById("btnProjectLevel").classList.remove("active");
  document.getElementById("btnProgrammeLevel").classList.remove("active");

  if (level === "project") {
    document.getElementById("btnProjectLevel").classList.add("active");
  } else {
    document.getElementById("btnProgrammeLevel").classList.add("active");
  }

  renderModules();
  renderContent("overview");
}

function renderModules() {
  const container = document.getElementById("moduleList");
  container.innerHTML = "";

  modules[state.level].forEach(m => {
    const div = document.createElement("div");
    div.className = "btn";
    div.innerText = m.name;

    div.onclick = () => renderContent(m.id);

    container.appendChild(div);
  });
}

function renderContent(moduleId) {
  const content = document.getElementById("content");

  if (moduleId === "overview") {
    content.innerHTML = `<h2 class="text-lg font-bold">Project Overview</h2>`;
  }
  else if (moduleId === "cashflow") {
    content.innerHTML = `<h2 class="text-lg font-bold">Cashflow Module</h2>`;
  }
  else if (moduleId === "costs") {
    content.innerHTML = `<h2 class="text-lg font-bold">Cost Tracking Module</h2>`;
  }
  else if (moduleId === "dashboard") {
    content.innerHTML = `<h2 class="text-lg font-bold">Programme Dashboard</h2>`;
  }
  else if (moduleId === "pipeline") {
    content.innerHTML = `<h2 class="text-lg font-bold">Programme Pipeline</h2>`;
  }
}

// ---------------- BOOT ----------------

window.addEventListener("load", () => {

  document.getElementById("app").classList.remove("hidden");

  setTimeout(() => {
    document.getElementById("loadingScreen").style.display = "none";
  }, 500);

  setLevel("project");

  setInterval(() => {
    const status = document.getElementById("authStatus");
    if (window.globalUserUid) {
      status.innerText = "Firebase: Connected ✔";
    } else {
      status.innerText = "Firebase: Waiting...";
    }
  }, 1000);

});

</script>

</body>
</html>
