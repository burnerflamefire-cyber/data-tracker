<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Project Data Tracker</title>

<style>
/* =========================
   WC GOV BLUE THEME
========================= */
:root {
  --bg: #0b1b2b;
  --panel: #002244;
  --panel-2: #003366;
  --accent: #0055aa;
  --text: #e6f0ff;
  --muted: #9bb3c7;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* =========================
   TOP HEADER
========================= */
header {
  height: 45px;
  background: var(--panel);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  border-bottom: 1px solid #003a66;
}

header .title {
  font-weight: bold;
  font-size: 14px;
}

header .status {
  font-size: 11px;
  color: var(--muted);
}

/* =========================
   MAIN LAYOUT
========================= */
#app {
  display: flex;
  height: calc(100vh - 45px);
}

/* =========================
   PRIMARY NAV
========================= */
#primaryNav {
  width: 200px;
  background: var(--panel);
  border-right: 1px solid #003a66;
  transition: width 0.2s;
}

#primaryNav.collapsed {
  width: 55px;
}

.nav-item {
  padding: 12px;
  cursor: pointer;
  font-size: 13px;
  border-left: 3px solid transparent;
  transition: 0.2s;
}

.nav-item:hover {
  background: var(--panel-2);
}

.nav-item.active {
  border-left: 3px solid var(--accent);
  background: #001a33;
}

/* =========================
   SECONDARY NAV
========================= */
#secondaryNav {
  width: 220px;
  background: #001a33;
  border-right: 1px solid #002b4d;
  transition: width 0.2s;
}

#secondaryNav.collapsed {
  width: 0;
  overflow: hidden;
}

/* =========================
   WORKSPACE
========================= */
#workspace {
  flex: 1;
  padding: 15px;
  overflow: auto;
}

.module-box {
  background: #001f3d;
  padding: 15px;
  border-radius: 6px;
  border: 1px solid #003a66;
}

/* =========================
   BUTTONS
========================= */
.btn {
  padding: 8px 10px;
  background: var(--panel-2);
  border: none;
  color: var(--text);
  cursor: pointer;
  font-size: 12px;
  margin: 5px 0;
  width: 100%;
  text-align: left;
}

.btn:hover {
  background: var(--accent);
}

/* COLLAPSE BUTTON */
.collapse-btn {
  font-size: 11px;
  padding: 6px;
  cursor: pointer;
  background: #001a33;
  color: var(--muted);
  text-align: center;
  border-bottom: 1px solid #003a66;
}

</style>
</head>

<body>

<!-- =========================
     HEADER
========================= -->
<header>
  <div class="title">Project Data Tracker</div>
  <div class="status" id="statusText">UI Shell Loaded</div>
</header>

<!-- =========================
     APP LAYOUT
========================= -->
<div id="app">

  <!-- PRIMARY NAV -->
  <div id="primaryNav">
    <div class="collapse-btn" onclick="togglePrimary()">☰</div>

    <div class="nav-item active" onclick="setMode('project')">
      Project Level
    </div>

    <div class="nav-item" onclick="setMode('programme')">
      Programme Level
    </div>
  </div>

  <!-- SECONDARY NAV -->
  <div id="secondaryNav">
    <div class="collapse-btn" onclick="toggleSecondary()">⇤</div>
    <div id="secondaryContent"></div>
  </div>

  <!-- WORKSPACE -->
  <div id="workspace">
    <div class="module-box" id="moduleBox">
      Welcome — Select a module
    </div>
  </div>

</div>

<script>
/* =========================
   APP STATE
========================= */
let appState = {
  mode: "project",
  module: null
};

/* =========================
   PRIMARY NAV MODE SWITCH
========================= */
function setMode(mode) {
  appState.mode = mode;

  document.querySelectorAll("#primaryNav .nav-item")
    .forEach(el => el.classList.remove("active"));

  event.target.classList.add("active");

  renderSecondaryNav();
}

/* =========================
   SECONDARY NAV RENDER
========================= */
function renderSecondaryNav() {
  const container = document.getElementById("secondaryContent");

  let items = [];

  if (appState.mode === "project") {
    items = ["Overview", "Data Capture", "Table View", "Analytics", "Completeness"];
  } else {
    items = ["Portfolio Overview", "Reporting", "Risk View", "Funding"];
  }

  container.innerHTML = "";

  items.forEach(i => {
    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerText = i;
    btn.onclick = () => loadModule(i);
    container.appendChild(btn);
  });
}

/* =========================
   MODULE LOADER (PLACEHOLDER)
========================= */
function loadModule(name) {
  appState.module = name;

  document.getElementById("moduleBox").innerHTML = `
    <h3>${name}</h3>
    <p>Module loaded successfully.</p>
    <p>Mode: ${appState.mode}</p>
  `;
}

/* =========================
   COLLAPSE TOGGLES
========================= */
function togglePrimary() {
  document.getElementById("primaryNav").classList.toggle("collapsed");
}

function toggleSecondary() {
  document.getElementById("secondaryNav").classList.toggle("collapsed");
}

/* =========================
   INIT
========================= */
renderSecondaryNav();
</script>

</body>
</html>
