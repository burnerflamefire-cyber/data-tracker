<!DOCTYPE html>
<html lang="en" class="h-full bg-[#001122]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrastructure Data Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body class="h-full text-gray-100 font-sans overflow-hidden">

    <div id="app-root" class="h-full flex flex-col"></div>

    <script type="module">
        import { AppController } from "./core/app.controller.js";
        // Initialize the master application orchestrator when DOM is ready
        document.addEventListener("DOMContentLoaded", () => {
            const controller = new AppController();
            controller.init();
        });
    </script>
</body>
</html>
