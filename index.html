<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Data Tracker</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- CONFIG -->
  <script src="config/app.config.js"></script>

  <script>
    // ---------------------------
    // SAFE FIREBASE INIT CHECK
    // ---------------------------
    let app, auth;
    let firebaseReady = false;
    let authUser = null;
    let authError = null;

    function initFirebase() {
      try {
        if (!window.firebase) throw new Error("Firebase SDK not loaded");

        app = firebase.initializeApp(window.firebaseConfig);
        auth = firebase.auth(app);

        firebaseReady = true;

        auth.onAuthStateChanged((user) => {
          if (user) {
            authUser = user;
            window.firebaseAuthUser = user;
          } else {
            // try anonymous login
            auth.signInAnonymously()
              .catch(err => {
                authError = err.message;
              });
          }
        });

      } catch (e) {
        authError = e.message;
      }
    }

    function render() {
      document.body.innerHTML = `
        <div style="font-family:Arial;padding:20px;">
          <h2>Project Data Tracker — Debug Mode</h2>

          <p><b>Firebase Loaded:</b> ${!!window.firebase}</p>
          <p><b>Firebase Ready:</b> ${firebaseReady}</p>

          <p><b>User:</b> ${authUser ? authUser.uid : "Waiting..."}</p>

          <p style="color:red;"><b>Error:</b> ${authError || "None"}</p>

          <hr/>
          <p>Status updates every 1s...</p>
        </div>
      `;
    }

    window.addEventListener("DOMContentLoaded", () => {
      initFirebase();
      render();
      setInterval(render, 1000);
    });
  </script>
</head>

<body></body>
</html>
