<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Data Tracker</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- CONFIG (MUST LOAD BEFORE ANY INIT) -->
  <script>
    // HARD SAFE INLINE CONFIG (prevents timing failure completely)
    window.firebaseConfig = {
      apiKey: "AIzaSyCL6iJKRp-WjCgBTtRCuRny14lUOMP9KJg",
      authDomain: "data-tracker-f11df.firebaseapp.com",
      databaseURL: "https://data-tracker-f11df-default-rtdb.firebaseio.com",
      projectId: "data-tracker-f11df",
      storageBucket: "data-tracker-f11df.firebasestorage.app",
      messagingSenderId: "462872028246",
      appId: "1:462872028246:web:eb90490bd650a85d76c7f7"
    };
  </script>

  <script>
    // -------------------------
    // BOOT STRAP (SAFE VERSION)
    // -------------------------

    let authUser = null;
    let authError = null;
    let firebaseReady = false;

    function initFirebase() {
      try {
        if (!window.firebaseConfig) {
          throw new Error("firebaseConfig missing");
        }

        const app = firebase.initializeApp(window.firebaseConfig);
        const auth = firebase.auth(app);

        firebaseReady = true;

        auth.onAuthStateChanged((user) => {
          if (user) {
            authUser = user;
            window.firebaseAuthUser = user;
          } else {
            auth.signInAnonymously()
              .catch(err => authError = err.message);
          }
        });

      } catch (e) {
        authError = e.message;
      }
    }

    function render() {
      document.body.innerHTML = `
        <div style="font-family:Arial;padding:20px;">
          <h2>Project Data Tracker — Firebase Boot Check</h2>

          <p><b>Config Loaded:</b> ${!!window.firebaseConfig}</p>
          <p><b>Firebase Ready:</b> ${firebaseReady}</p>

          <p><b>User:</b> ${authUser ? authUser.uid : "Waiting..."}</p>

          <p style="color:red;"><b>Error:</b> ${authError || "None"}</p>
        </div>
      `;
    }

    window.addEventListener("DOMContentLoaded", () => {
      initFirebase();
      render();
      setInterval(render, 1000);
    });
  </script>
</head>

<body></body>
</html>
