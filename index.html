<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Project Data Tracker</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- Config -->
<script src="config/app.config.js"></script>

<!-- Auth -->
<script src="auth/auth.firebase.js"></script>

<style>
/* =========================
   WESTERN CAPE GOV THEME
   ========================= */

:root {
  --wcg-blue: #002244;
  --wcg-blue-light: #003366;
  --wcg-blue-accent: #0055aa;
  --text-light: #ffffff;
  --bg-dark: #0b1a2b;
  --panel-dark: #0f2740;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: var(--bg-dark);
  color: var(--text-light);
  height: 100vh;
  overflow: hidden;
}

/* =========================
   LAYOUT GRID
   ========================= */

.app-container {
  display: flex;
  height: 100vh;
}

/* =========================
   FAR LEFT VERTICAL NAV
   ========================= */

.vertical-nav {
  width: 60px;
  background: var(--wcg-blue);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
  gap: 20px;
}

.vertical-btn {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  background: transparent;
  border: none;
  color: white;
  font-weight: bold;
  letter-spacing: 1px;
  cursor: pointer;
  padding: 10px 5px;
  opacity: 0.7;
  transition: all 0.2s ease;
  border-left: 3px solid transparent;
}

.vertical-btn:hover {
  opacity: 1;
  background: var(--wcg-blue-light);
}

.vertical-btn.active {
  opacity: 1;
  border-left: 3px solid var(--wcg-blue-accent);
  background: var(--wcg-blue-light);
}

/* =========================
   SECONDARY NAV
   ========================= */

.side-nav {
  width: 220px;
  background: var(--panel-dark);
  display: flex;
  flex-direction: column;
  padding: 10px;
  transition: width 0.3s ease;
}

.side-nav.collapsed {
  width: 0;
  overflow: hidden;
}

.side-title {
  font-size: 12px;
  opacity: 0.7;
  margin: 10px 0;
}

.nav-item {
  padding: 10px;
  margin: 4px 0;
  background: #122c47;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: 0.2s;
}

.nav-item:hover {
  background: var(--wcg-blue-accent);
}

.nav-item.active {
  background: var(--wcg-blue-accent);
  font-weight: bold;
}

/* =========================
   MAIN CONTENT
   ========================= */

.main {
  flex: 1;
  background: #0a1624;
  display: flex;
  flex-direction: column;
}

.top-bar {
  height: 45px;
  background: var(--wcg-blue);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 15px;
  font-size: 12px;
}

.workspace {
  flex: 1;
  padding: 15px;
  overflow: auto;
}

.card {
  background: #11263d;
  padding: 20px;
  border-radius: 8px;
  border: 1px solid #1b3b5c;
}

/* =========================
   COLLAPSE BUTTON
   ========================= */

.toggle-btn {
  position: absolute;
  top: 50%;
  left: 220px;
  transform: translateY(-50%);
  background: var(--wcg-blue-accent);
  border: none;
  color: white;
  padding: 5px 8px;
  cursor: pointer;
  font-size: 10px;
}
</style>
</head>

<body>

<div class="app-container">

  <!-- FAR LEFT: VERTICAL NAV -->
  <div class="vertical-nav">
    <button class="vertical-btn active" onclick="switchMode('project')">
      PROJECT
    </button>

    <button class="vertical-btn" onclick="switchMode('programme')">
      PROGRAMME
    </button>
  </div>

  <!-- SECONDARY NAV -->
  <div id="sideNav" class="side-nav">
    <div class="side-title" id="sideTitle">Project Navigation</div>

    <div class="nav-item active">Dashboard</div>
    <div class="nav-item">Data Capture</div>
    <div class="nav-item">Tables</div>
    <div class="nav-item">Reports</div>
  </div>

  <!-- MAIN AREA -->
  <div class="main">

    <!-- TOP BAR -->
    <div class="top-bar">
      <div>Project Data Tracker</div>
      <div id="authStatus">Auth: Initialising...</div>
    </div>

    <!-- WORKSPACE -->
    <div class="workspace">
      <div class="card">
        <h2>System Shell Loaded ✔</h2>
        <br/>
        <p>
          This is the UI shell. Next step will connect:
        </p>
        <br/>
        <ul>
          <li>Module loader (Project / Programme)</li>
          <li>Dynamic navigation</li>
          <li>Data input engine</li>
          <li>Firebase live binding</li>
        </ul>
      </div>
    </div>

  </div>
</div>

<script>
/* =========================
   UI STATE CONTROL
   ========================= */

let currentMode = "project";

function switchMode(mode) {
  currentMode = mode;

  // update vertical buttons
  document.querySelectorAll(".vertical-btn").forEach(btn => {
    btn.classList.remove("active");
  });

  event.target.classList.add("active");

  // update side nav content
  const title = document.getElementById("sideTitle");

  if (mode === "project") {
    title.innerText = "Project Navigation";
  } else {
    title.innerText = "Programme Navigation";
  }
}

/* =========================
   AUTH STATUS HOOK
   ========================= */

setInterval(() => {
  const el = document.getElementById("authStatus");

  if (window.globalUserUid) {
    el.innerText = "Auth: Connected ✔ " + window.globalUserUid.substring(0, 6);
  } else {
    el.innerText = "Auth: Waiting...";
  }
}, 1000);
</script>

</body>
</html>
