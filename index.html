<body class="h-full text-gray-100 font-sans overflow-hidden">

    <script type="module">
        
        /* ==========================================================================
           2. CORE APPLICATION ENGINE BACKBONES (EventBus & StateStore)
           ========================================================================== */
        
        class EventBus {
            constructor() { this.listeners = {}; }
            on(event, callback) {
                if (!this.listeners[event]) this.listeners[event] = [];
                this.listeners[event].push(callback);
            }
            emit(event, data) {
                if (!this.listeners[event]) return;
                this.listeners[event].forEach(cb => cb(data));
            }
        }
        const eventBus = new EventBus();

        class StateStore {
            constructor() {
                this.state = {
                    currentMode: "PROJECT",       // Context Switch: "PROJECT" or "PROGRAMME"
                    activeModule: "overview",     // Active Inner Workspace Sub-View 
                    selectedProjectId: "PRJ-001",
                    projects: {
                        "PRJ-001": { id: "PRJ-001", name: "Cape Town Clinic Expansion", type: "Health Facility", sector: "Health" },
                        "PRJ-002": { id: "PRJ-002", name: "Stellenbosch Road Upgrade", type: "Civil Infrastructure", sector: "Transport" }
                    },
                    records: []                   // Universal minimal records synced from Firebase
                };
            }
            getState() { return this.state; }
            set(key, value) {
                this.state[key] = value;
                eventBus.emit("state:changed", this.state);
            }
            setRecords(recordsArray) {
                this.state.records = recordsArray;
                eventBus.emit("state:recordsUpdated", this.state.records);
            }
        }
        const store = new StateStore();

        /* ==========================================================================
           3. DATA BLUEPRINT MODEL & CONFIGURATION DICTIONARY SERVICES
           ========================================================================== */
        
        function createUniversalRecord(data = {}) {
            return {
                uid: data.uid || Math.random().toString(36).substring(2, 15),
                timestamp: data.timestamp || new Date().toISOString(),
                facilityName: data.facilityName || "Unassigned Facility",
                facilityGUID: data.facilityGUID || "FAC-GENERIC",
                projectName: data.projectName || "General Portfolio Target",
                projectGUID: data.projectGUID || "PRJ-GENERIC",
                programme: data.programme || "Infrastructure Delivery",
                subProgramme: data.subProgramme || "Capital Works",
                rolloutFY: data.rolloutFY || "2026/2027",
                projectPhase: data.projectPhase || "Execution",
                date: data.date || new Date().toISOString().split('T')[0],
                mainCategory: data.mainCategory || "",
                subCategory: data.subCategory || "",
                dataCategory: data.dataCategory || "Unresolved Category",
                freeText: data.freeText || "",
                unit: data.unit || "Units",
                quantity: parseFloat(data.quantity) || 0,
                rate: parseFloat(data.rate) || 0,
                amount: parseFloat(data.amount) || 0,
                auditLog: data.auditLog || `${window.globalUserUid || 'System'} | ${new Date().toISOString()} | Record Created\n`,
                completenessStatus: data.completenessStatus || "Pending",
                lastUpdated: data.lastUpdated || new Date().toISOString()
            };
        }

        const categoryService = {
            matrix: {
                "Financials": {
                    "Capital Expenditure": { category: "FIN-CAPEX", unit: "ZAR", rate: 1 },
                    "Operational Maintenance": { category: "FIN-OPEX", unit: "ZAR", rate: 1 },
                    "Professional Fees": { category: "FIN-PROF", unit: "Hours", rate: 850 }
                },
                "Milestones": {
                    "Site Handover": { category: "MILE-START", unit: "Days", rate: 0 },
                    "Practical Completion": { category: "MILE-PRACT", unit: "Days", rate: 0 },
                    "Final Handover": { category: "MILE-FINAL", unit: "Days", rate: 0 }
                },
                "Resources": {
                    "Local Labor Force": { category: "RES-LABOR", unit: "People", rate: 220 },
                    "Structural Steel": { category: "RES-STEEL", unit: "Tons", rate: 18500 },
                    "Portland Cement": { category: "RES-CEMENT", unit: "Bags", rate: 95 }
                }
            },
            getMainCategories() { return Object.keys(this.matrix); },
            getSubCategories(mainCat) { return mainCat && this.matrix[mainCat] ? Object.keys(this.matrix[mainCat]) : []; },
            resolveMapping(mainCat, subCat) {
                return this.matrix[mainCat] && this.matrix[mainCat][subCat] 
                    ? this.matrix[mainCat][subCat] 
                    : { category: "SYS-UNRESOLVED", unit: "Units", rate: 0 };
            },
            getRequiredCategoriesForProject(projectId) {
                return ["FIN-CAPEX", "FIN-OPEX", "MILE-START", "MILE-PRACT", "RES-LABOR"];
            }
        };

        const auditService = {
            stampChange(existingRecord, targetField, incomingValue) {
                const user = window.globalUserUid ? window.globalUserUid.substring(0, 5) : "User";
                const timeStr = new Date().toISOString().replace('T', ' ').substring(0, 19);
                const priorValue = existingRecord[targetField] !== undefined ? existingRecord[targetField] : "NULL";
                return `${user} | ${timeStr} | Field '${targetField}' Modified [${priorValue}] → [${incomingValue}]\n`;
            }
        };

        /* ==========================================================================
           4. FIREBASE DATA INTEGRATION LAYER SERVICE
           ========================================================================== */
        
        const firebaseService = {
            dbRef: null,
            init() {
                this.dbRef = window.db.ref("universal_records");
                this.listenToRecords();
            },
            listenToRecords() {
                this.dbRef.on("value", (snapshot) => {
                    const data = snapshot.val();
                    const recordsList = [];
                    if (data) {
                        Object.keys(data).forEach(key => {
                            recordsList.push({ dbKey: key, ...data[key] });
                        });
                    }
                    store.setRecords(recordsList);
                });
            },
            async saveRecord(record) {
                if (record.dbKey) {
                    const targetKey = record.dbKey;
                    const cleanRecord = { ...record };
                    delete cleanRecord.dbKey;
                    await this.dbRef.child(targetKey).set(cleanRecord);
                } else {
                    await this.dbRef.push(record);
                }
                eventBus.emit("notification:success", "Ledger synchronization successful.");
            }
        };

        /* ==========================================================================
           5. SYSTEM FRAMEWORK AUTHENTICATION LOOPS
           ========================================================================== */
        
        function initializeAuthentication(onSuccessCallback) {
            const app = firebase.initializeApp(window.firebaseConfig);
            window.db = firebase.database(app);
            window.auth = firebase.auth(app);
            window.globalUserUid = null;

            let currentUser = localStorage.getItem("qt_username") || "Operational User";

            window.auth.signInAnonymously()
                .then((userCredential) => {
                    window.globalUserUid = userCredential.user.uid;
                    
                    document.getElementById("authStatusPanel").className = "bg-[#002244] border border-[#004488] rounded px-1.5 py-0.5 text-[9px] font-mono inline-flex items-center gap-1 shadow-md text-emerald-400";
                    document.getElementById("authStatusText").innerHTML = "Connected ✔";
                    document.getElementById("authUidDisplay").innerText = "UID: " + window.globalUserUid.substring(0, 5);
                    document.getElementById("authUidDisplay").classList.remove("hidden");
                    document.getElementById("userBadge").innerHTML = `<i class="fa-solid fa-user-gear mr-0.5"></i> Operator: <strong>${currentUser}</strong>`;
                    
                    console.log("Auth Success System Active ✔ UID:", window.globalUserUid);
                    if (onSuccessCallback) onSuccessCallback(userCredential.user);
                })
                .catch((error) => {
                    console.error("Auth Loop Crash:", error);
                    document.getElementById("authStatusText").innerHTML = "Auth Broken ✘";
                    document.getElementById("authStatusPanel").className = "bg-rose-950 border border-rose-500 rounded px-1.5 py-0.5 text-[9px] font-mono text-rose-400 shadow-md";
                });
        }

        /* ==========================================================================
           6. FRONTEND USER INTERFACE COMPONENT WIDGETS
           ========================================================================== */
        
        // --- COMPONENTS: COMPLETENESS ENGINE WIDGET ---
        function mountCompletenessEngineWidget(targetParentId) {
            const target = document.getElementById(targetParentId);
            if (!target) return;
            
            const state = store.getState();
            const activeId = state.selectedProjectId;
            const expectedCodes = categoryService.getRequiredCategoriesForProject(activeId);
            const activeRecords = state.records.filter(r => r.projectGUID === activeId);
            const capturedCodes = new Set(activeRecords.map(r => r.dataCategory));

            let filledCount = 0;
            const itemsHtml = expectedCodes.map(code => {
                const checked = capturedCodes.has(code);
                if (checked) filledCount++;
                return `
                    <div class="flex items-center justify-between bg-[#001122] px-2 py-1 rounded text-[11px] border border-[#002244]">
                        <span class="text-slate-300 font-bold">${code}</span>
                        <span class="flex items-center gap-1 ${checked ? 'text-emerald-400' : 'text-rose-400'} font-semibold text-[10px]">
                            <i class="fa-solid ${checked ? 'fa-circle-check' : 'fa-circle-exclamation'}"></i>
                            ${checked ? 'Satisfied' : 'Deficient'}
                        </span>
                    </div>
                `;
            }).join('');

            const percent = expectedCodes.length > 0 ? Math.round((filledCount / expectedCodes.length) * 100) : 100;

            target.innerHTML = `
                <div class="bg-[#001a33] border border-[#002b54] rounded p-4 shadow-xl font-mono text-xs max-w-sm">
                    <h4 class="text-xs font-bold text-slate-300 uppercase tracking-wider mb-2 border-b border-[#002b54] pb-1.5 flex items-center justify-between">
                        <span><i class="fa-solid fa-gauge-high mr-1 text-sky-400"></i> Completeness Metric</span>
                        <span class="text-amber-400">${percent}%</span>
                    </h4>
                    <div class="w-full bg-slate-900 rounded-full h-2 mb-4 overflow-hidden border border-slate-800">
                        <div class="h-full bg-gradient-to-r from-sky-500 to-emerald-500 transition-all duration-500" style="width: ${percent}%"></div>
                    </div>
                    <div class="space-y-1.5 max-h-[180px] overflow-y-auto pr-1">${itemsHtml}</div>
                </div>
            `;
        }

        // --- COMPONENTS: DATA CAPTURE ENTRY FORM ENGINE ---
        function mountDataCaptureForm(targetParentId) {
            const target = document.getElementById(targetParentId);
            
            target.innerHTML = `
                <div class="bg-[#001a33] border border-[#002b54] rounded p-5 max-w-2xl shadow-xl">
                    <h3 class="text-sm font-mono font-bold uppercase tracking-wider text-sky-400 mb-4 border-b border-[#002b54] pb-2">
                        <i class="fa-solid fa-square-plus mr-1"></i> Data Log Transaction Form
                    </h3>
                    <form id="universal-capture-form" class="space-y-4 text-xs font-mono">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-slate-400 font-semibold mb-1">Main Classification Category</label>
                                <select id="form-main-cat" class="w-full bg-[#001122] border border-[#003366] rounded p-2 text-slate-200 outline-none" required>
                                    <option value="">-- Choose Category --</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-slate-400 font-semibold mb-1">Sub Classification Mapping</label>
                                <select id="form-sub-cat" class="w-full bg-[#001122] border border-[#003366] rounded p-2 text-slate-200 outline-none" disabled required>
                                    <option value="">-- Awaiting Selection --</option>
                                </select>
                            </div>
                        </div>
                        <div class="bg-[#001122] border border-[#002244] p-2 rounded flex items-center justify-between">
                            <span class="text-slate-400 text-[10px]">Resolved Data Schema Pointer:</span>
                            <span id="form-resolved-badge" class="bg-[#002b54] text-sky-300 font-bold px-2 py-0.5 rounded border border-[#004488]">SYS-AWAITING-INPUT</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div><label class="block text-slate-400 font-semibold mb-1">Quantity</label><input type="number" id="form-qty" step="any" value="0" class="w-full bg-[#001122] border border-[#003366] rounded p-2 text-slate-200 outline-none" required /></div>
                            <div><label class="block text-slate-400 font-semibold mb-1">Rate (ZAR)</label><input type="number" id="form-rate" step="any" value="0" class="w-full bg-[#001122] border border-[#003366] rounded p-2 text-slate-200 outline-none" required /></div>
                            <div><label class="block text-slate-400 font-semibold mb-1">Extended Amount</label><input type="text" id="form-amount" value="0.00" class="w-full bg-[#000d1a] border border-[#002244] rounded p-2 text-amber-400 font-bold" readonly /></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="block text-slate-400 font-semibold mb-1">Operational Date</label><input type="date" id="form-date" class="w-full bg-[#001122] border border-[#003366] rounded p-2 text-slate-200 outline-none" required /></div>
                            <div><label class="block text-slate-400 font-semibold mb-1">Measurement Unit</label><input type="text" id="form-unit" class="w-full bg-[#000d1a] border border-[#002244] rounded p-2 text-slate-400" readonly /></div>
                        </div>
                        <div><label class="block text-slate-400 font-semibold mb-1">FreeText Narrative</label><textarea id="form-text" rows="2" class="w-full bg-[#001122] border border-[#003366] rounded p-2 text-slate-200 outline-none"></textarea></div>
                        <button type="submit" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-2 rounded uppercase tracking-wider text-xs transition-colors"><i class="fa-solid fa-cloud-arrow-up mr-1"></i> File Document Stream to Ledger</button>
                    </form>
                </div>
            `;

            // Form Logic Harness 
            const mainSel = document.getElementById("form-main-cat");
            const subSel = document.getElementById("form-sub-cat");
            const badge = document.getElementById("form-resolved-badge");
            const qty = document.getElementById("form-qty");
            const rate = document.getElementById("form-rate");
            const amt = document.getElementById("form-amount");
            const unit = document.getElementById("form-unit");
            const dateIn = document.getElementById("form-date");
            const fEl = document.getElementById("universal-capture-form");

            dateIn.value = new Date().toISOString().split('T')[0];

            categoryService.getMainCategories().forEach(c => {
                const o = document.createElement("option"); o.value = c; o.innerText = c; mainSel.appendChild(o);
            });

            mainSel.onchange = () => {
                subSel.innerHTML = '<option value="">-- Choose SubCategory --</option>';
                if (!mainSel.value) { subSel.disabled = true; badge.innerText = "SYS-AWAITING-INPUT"; return; }
                categoryService.getSubCategories(mainSel.value).forEach(s => {
                    const o = document.createElement("option"); o.value = s; o.innerText = s; subSel.appendChild(o);
                });
                subSel.disabled = false;
            };

            subSel.onchange = () => {
                if(!mainSel.value || !subSel.value) return;
                const mapping = categoryService.resolveMapping(mainSel.value, subSel.value);
                badge.innerText = mapping.category;
                unit.value = mapping.unit;
                rate.value = mapping.rate;
                amt.value = (parseFloat(qty.value || 0) * parseFloat(rate.value || 0)).toFixed(2);
            };

            const recalc = () => { amt.value = (parseFloat(qty.value || 0) * parseFloat(rate.value || 0)).toFixed(2); };
            qty.oninput = recalc; rate.oninput = recalc;

            fEl.onSubmit = async (e) => {
                e.preventDefault();
                const activeProj = store.getState().projects[store.getState().selectedProjectId];
                const rec = createUniversalRecord({
                    projectName: activeProj.name, projectGUID: activeProj.id,
                    mainCategory: mainSel.value, subCategory: subSel.value, dataCategory: badge.innerText,
                    quantity: parseFloat(qty.value), rate: parseFloat(rate.value), amount: parseFloat(amt.value),
                    date: dateIn.value, unit: unit.value, freeText: document.getElementById("form-text").value
                });
                await firebaseService.saveRecord(rec);
                fEl.reset();
                dateIn.value = new Date().toISOString().split('T')[0];
                badge.innerText = "SYS-AWAITING-INPUT";
                subSel.disabled = true;
            };
            // Intercept form dispatch mappings manually
            fEl.addEventListener("submit", fEl.onSubmit);
        }

        // --- COMPONENTS: BI-DIRECTIONAL LEDGER GRID TABLE ---
        function mountLedgerTableGrid(targetParentId) {
            const target = document.getElementById(targetParentId);
            target.innerHTML = `
                <div class="bg-[#001a33] border border-[#002b54] rounded shadow-xl overflow-hidden flex flex-col flex-1">
                    <div class="p-3 bg-[#002244] border-b border-[#002b54] flex justify-between items-center">
                        <span class="text-xs font-mono font-bold text-slate-300 uppercase tracking-wider"><i class="fa-solid fa-table mr-1 text-sky-400"></i> Transaction Ledger Registry Matrix</span>
                    </div>
                    <div class="overflow-auto max-h-[380px]">
                        <table class="w-full text-left text-xs font-mono border-collapse whitespace-nowrap">
                            <thead class="bg-[#001122] text-slate-400 sticky top-0 border-b border-[#002b54] z-10">
                                <tr>
                                    <th class="p-2 border-r border-[#002b54]">Date</th>
                                    <th class="p-2 border-r border-[#002b54]">Category</th>
                                    <th class="p-2 border-r border-[#002b54]">Free Text Definition Notes</th>
                                    <th class="p-2 border-r border-[#002b54]">Unit</th>
                                    <th class="p-2 border-r border-[#002b54]">Quantity</th>
                                    <th class="p-2 border-r border-[#002b54]">Rate (ZAR)</th>
                                    <th class="p-2 border-r border-[#002b54]">Amount (ZAR)</th>
                                    <th class="p-1 text-center">Audit</th>
                                </tr>
                            </thead>
                            <tbody id="ledger-grid-rows" class="divide-y divide-[#00264d] text-slate-300"></tbody>
                        </table>
                    </div>
                </div>
            `;
            renderLiveDatabaseRows();
        }

        function renderLiveDatabaseRows() {
            const body = document.getElementById("ledger-grid-rows");
            if (!body) return;
            const currentProjId = store.getState().selectedProjectId;
            const records = store.getState().records.filter(r => r.projectGUID === currentProjId);

            if (records.length === 0) {
                body.innerHTML = `<tr><td colspan="8" class="p-6 text-center text-slate-500 italic">No transactional records encountered mapping inside this project scope context.</td></tr>`;
                return;
            }

            body.innerHTML = "";
            records.forEach(row => {
                const tr = document.createElement("tr");
                tr.className = "hover:bg-[#002244]/40 transition-colors";
                tr.innerHTML = `
                    <td class="p-2 border-r border-[#002b54]" data-field="date" data-key="${row.dbKey}">${row.date}</td>
                    <td class="p-2 border-r border-[#002b54] text-sky-400 font-bold">${row.dataCategory}</td>
                    <td class="p-2 border-r border-[#002b54] max-w-xs truncate" data-field="freeText" data-key="${row.dbKey}">${row.freeText || ''}</td>
                    <td class="p-2 border-r border-[#002b54] text-slate-400">${row.unit}</td>
                    <td class="p-2 border-r border-[#002b54] text-right" data-field="quantity" data-key="${row.dbKey}">${row.quantity}</td>
                    <td class="p-2 border-r border-[#002b54] text-right" data-field="rate" data-key="${row.dbKey}">${row.rate}</td>
                    <td class="p-2 border-r border-[#002b54] text-right text-amber-400 font-bold">${row.amount.toFixed(2)}</td>
                    <td class="p-1 text-center">
                        <button class="bg-[#002244] border border-[#004488] px-1 rounded text-[10px] hover:bg-[#003366] audit-btn" data-log="${encodeURIComponent(row.auditLog)}"><i class="fa-solid fa-timeline"></i> View</button>
                    </td>
                `;
                body.appendChild(tr);
            });

            // Double Click Inline Grid Matrix Mutation Harness Wireup Loop
            body.querySelectorAll("[data-field]").forEach(cell => {
                cell.className += " cursor-pointer select-none";
                cell.ondblclick = () => {
                    if (cell.querySelector("input")) return;
                    const key = cell.getAttribute("data-key");
                    const field = cell.getAttribute("data-field");
                    const originalRecord = store.getState().records.find(r => r.dbKey === key);
                    const originalVal = cell.innerText;

                    const input = document.createElement("input");
                    input.value = originalVal;
                    input.className = "bg-[#001122] text-white text-xs border border-sky-400 p-0.5 rounded w-full font-mono";
                    cell.innerHTML = ""; cell.appendChild(input); input.focus();

                    input.onblur = async () => {
                        if (input.value === originalVal) { cell.innerText = originalVal; return; }
                        const stamp = auditService.stampChange(originalRecord, field, input.value);
                        const updatedRecord = {
                            ...originalRecord,
                            [field]: (field === "quantity" || field === "rate") ? parseFloat(input.value) || 0 : input.value,
                            auditLog: originalRecord.auditLog + stamp,
                            lastUpdated: new Date().toISOString()
                        };
                        updatedRecord.amount = updatedRecord.quantity * updatedRecord.rate;
                        await firebaseService.saveRecord(updatedRecord);
                    };
                    input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); };
                };
            });

            body.querySelectorAll(".audit-btn").forEach(btn => {
                btn.onclick = () => alert(`--- SYSTEM IMMUTABLE AUDIT TRAIL LOG RECORD TRANSACTION ---\n\n${decodeURIComponent(btn.getAttribute("data-log"))}`);
            });
        }

        /* ==========================================================================
           7. MODULES LAYER CANVAS COORDINATORS (Project & Programme Modules)
           ========================================================================== */
        
        const projectModule = {
            render(viewMode) {
                const canvas = document.getElementById("main-workspace");
                const activeProj = store.getState().projects[store.getState().selectedProjectId];
                
                canvas.innerHTML = `
                    <div class="mb-4 shrink-0">
                        <div class="text-[10px] uppercase font-bold text-sky-400 font-mono">Project Level Context Canvas</div>
                        <h2 class="text-base font-bold text-white flex items-center gap-2 mt-0.5">${activeProj.name} <span class="text-[10px] bg-[#002244] border border-[#004488] px-1.5 py-0.5 rounded text-slate-300 font-mono">${activeProj.id}</span></h2>
                    </div>
                    <div id="inner-canvas" class="flex-1 flex flex-col gap-4"></div>
                `;

                const inner = document.getElementById("inner-canvas");
                if (viewMode === "overview") {
                    inner.innerHTML = `
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 items-start">
                            <div class="lg:col-span-2 bg-[#001a33] border border-[#002b54] p-4 rounded font-mono text-xs space-y-1.5">
                                <div class="text-sky-400 font-bold border-b border-[#002b54] pb-1 uppercase text-[10px]">Asset Parameters</div>
                                <p><span class="text-slate-400 inline-block w-24">Facility Type:</span> ${activeProj.type}</p>
                                <p><span class="text-slate-400 inline-block w-24">Sector Domain:</span> ${activeProj.sector}</p>
                            </div>
                            <div id="comp-widget-target"></div>
                        </div>
                    `;
                    mountCompletenessEngineWidget("comp-widget-target");
                } else if (viewMode === "capture") {
                    inner.innerHTML = `<div class="grid grid-cols-1 lg:grid-cols-3 gap-4 items-start"><div id="form-target" class="lg:col-span-2"></div><div id="comp-widget-target"></div></div>`;
                    mountDataCaptureForm("form-target");
                    mountCompletenessEngineWidget("comp-widget-target");
                } else if (viewMode === "tables") {
                    inner.innerHTML = `<div id="table-target" class="flex flex-col flex-1"></div>`;
                    mountLedgerTableGrid("table-target");
                }
            }
        };

        const programmeModule = {
            render(viewMode) {
                const canvas = document.getElementById("main-workspace");
                const records = store.getState().records;
                const totalValue = records.reduce((sum, r) => sum + (parseFloat(r.amount) || 0), 0);

                canvas.innerHTML = `
                    <div class="mb-4 shrink-0">
                        <div class="text-[10px] uppercase font-bold text-purple-400 font-mono">Programme Portfolio Matrix Context Canvas</div>
                        <h2 class="text-base font-bold text-white mt-0.5"><i class="fa-solid fa-layer-group text-slate-400 mr-1"></i> Macro Portfolio Aggregation Layer</h2>
                    </div>
                    <div id="inner-canvas" class="flex-1 flex flex-col gap-4"></div>
                `;

                const inner = document.getElementById("inner-canvas");
                if (viewMode === "overview") {
                    inner.innerHTML = `
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 font-mono text-xs">
                            <div class="bg-[#001a33] border border-[#002b54] p-4 rounded">
                                <div class="text-slate-400 uppercase text-[9px] font-bold tracking-wider mb-1">Portfolio Committed Value Aggregate</div>
                                <div class="text-xl font-bold text-emerald-400 font-sans">ZAR ${totalValue.toLocaleString('en-ZA', { minimumFractionDigits: 2 })}</div>
                            </div>
                            <div class="bg-[#001a33] border border-[#002b54] p-4 rounded">
                                <div class="text-slate-400 uppercase text-[9px] font-bold tracking-wider mb-1">Active Database Registry Transaction Count</div>
                                <div class="text-xl font-bold text-sky-400 font-sans">${records.length} Logs Filed</div>
                            </div>
                        </div>
                    `;
                } else {
                    inner.innerHTML = `<div class="text-xs font-mono text-slate-500 italic bg-[#001a33] border border-[#002b54] p-4 rounded">Extended aggregation pipelines modules mapping pending workspace development overrides.</div>`;
                }
            }
        };

        /* ==========================================================================
           8. MASTER VISUAL APPLICATION SHELL FRAMEWORK RENDERER LAYOUTS
           ========================================================================== */
        
        function initLayoutShell() {
            document.getElementById("app-root").innerHTML = `
                <header class="h-10 bg-[#00152b] border-b border-[#002d5c] flex items-center justify-between px-3 shrink-0 z-10">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-circle-nodes text-sky-400 text-sm"></i>
                        <h1 class="font-bold tracking-wider text-[11px] text-slate-200 uppercase font-mono">Infrastructure Data Tracker</h1>
                    </div>
                    <div id="toast-container" class="fixed top-2 right-4 flex flex-col gap-1应用 z-50"></div>
                    <div class="flex items-center gap-2 text-xs font-mono">
                        <div id="authStatusPanel" class="bg-slate-800 border border-slate-700 px-1.5 py-0.5 rounded text-[9px]"><span id="authStatusText">Connecting...</span></div>
                        <div id="authUidDisplay" class="hidden text-slate-400 text-[9px] bg-slate-900 border border-slate-800 px-1.5 py-0.5 rounded"></div>
                        <div id="userBadge" class="text-[10px] text-slate-300 border-l border-[#002d5c] pl-2"></div>
                    </div>
                </header>
                <div class="flex flex-1 overflow-hidden">
                    <nav id="nav-primary" class="w-14 bg-[#002244] border-r border-[#003366] flex flex-col items-center py-4 gap-4 shrink-0"></nav>
                    <nav id="nav-secondary" class="w-44 bg-[#001a33] border-r border-[#002b54] flex flex-col p-2 gap-0.5 shrink-0"></nav>
                    <main id="main-workspace" class="flex-1 bg-[#001122] flex flex-col overflow-y-auto p-4"></main>
                </div>
            `;
            renderPrimaryNavigation();
            renderSecondaryNavigation();
        }

        function renderPrimaryNavigation() {
            const container = document.getElementById("nav-primary");
            const mode = store.getState().currentMode;
            container.innerHTML = `
                <button id="p-btn-p" class="w-10 h-10 rounded flex flex-col items-center justify-center p-1 transition-all ${mode === 'PROJECT' ? 'bg-[#003366] text-white border-l-2 border-sky-400' : 'text-slate-400 hover:bg-[#002d5c]' }">
                    <i class="fa-solid fa-building-columns text-xs"></i><span class="text-[7px] font-bold uppercase tracking-tighter mt-1">Project</span>
                </button>
                <button id="p-btn-m" class="w-10 h-10 rounded flex flex-col items-center justify-center p-1 transition-all ${mode === 'PROGRAMME' ? 'bg-[#003366] text-white border-l-2 border-sky-400' : 'text-slate-400 hover:bg-[#002d5c]' }">
                    <i class="fa-solid fa-folder-tree text-xs"></i><span class="text-[7px] font-bold uppercase tracking-tighter mt-1">Prog</span>
                </button>
            `;
            document.getElementById("p-btn-p").onclick = () => eventBus.emit("nav:modeChanged", "PROJECT");
            document.getElementById("p-btn-m").onclick = () => eventBus.emit("nav:modeChanged", "PROGRAMME");
        }

        function renderSecondaryNavigation() {
            const container = document.getElementById("nav-secondary");
            const state = store.getState();
            const currentView = state.activeModule;

            if (state.currentMode === "PROJECT") {
                container.innerHTML = `
                    <div class="text-[8px] text-sky-400 tracking-wider font-bold uppercase mb-1.5 px-1 font-mono">Asset Focus</div>
                    ${createSecBtn("overview", "fa-circle-info", "Overview Tracker", currentView)}
                    ${createSecBtn("capture", "fa-pen-to-square", "Capture Engine", currentView)}
                    ${createSecBtn("tables", "fa-table-cells", "Data Ledger Grid", currentView)}
                `;
            } else {
                container.innerHTML = `
                    <div class="text-[8px] text-purple-400 tracking-wider font-bold uppercase mb-1.5 px-1 font-mono">Portfolio Control</div>
                    ${createSecBtn("overview", "fa-chart-pie", "Aggregate Dashboard", currentView)}
                    ${createSecBtn("aggregation", "fa-layer-group", "Rollup Matrices", currentView)}
                `;
            }

            container.querySelectorAll("[data-view]").forEach(btn => {
                btn.onclick = () => eventBus.emit("nav:viewChanged", btn.getAttribute("data-view"));
            });
        }

        function createSecBtn(viewId, icon, label, activeView) {
            const select = viewId === activeView;
            return `<button data-view="${viewId}" class="w-full flex items-center gap-1.5 px-1.5 py-1 rounded text-left font-mono text-[11px] transition-all ${select ? 'bg-[#002b54] text-white border-r-2 border-sky-400 font-semibold' : 'text-slate-400 hover:bg-[#002244] hover:text-slate-200'}"><i class="fa-solid ${icon} w-3 text-center text-[10px]"></i><span>${label}</span></button>`;
        }

        /* ==========================================================================
           9. MAIN APPLICATION SYSTEMS COORDINATION LIFECYCLE ROUTINES
           ========================================================================== */
        
        function loadContextModuleWorkspace() {
            const state = store.getState();
            if (state.currentMode === "PROJECT") {
                projectModule.render(state.activeModule);
            } else {
                programmeModule.render(state.activeModule);
            }
        }

        function showToastMessage(text, bgClass) {
            const box = document.getElementById("toast-container");
            if (!box) return;
            const toast = document.createElement("div");
            toast.className = `${bgClass} text-white px-2 py-1 rounded text-[10px] font-mono shadow-md transition-opacity duration-300`;
            toast.innerText = text; box.appendChild(toast);
            setTimeout(() => { toast.classList.add("opacity-0"); setTimeout(() => toast.remove(), 300); }, 2500);
        }

        // Connect Communication Bus Event Mappings 
        eventBus.on("nav:modeChanged", (m) => {
            store.set("currentMode", m); store.set("activeModule", "overview");
            renderPrimaryNavigation(); renderSecondaryNavigation(); loadContextModuleWorkspace();
        });
        eventBus.on("nav:viewChanged", (v) => {
            store.set("activeModule", v);
            renderSecondaryNavigation(); loadContextModuleWorkspace();
        });
        eventBus.on("state:recordsUpdated", () => {
            const body = document.getElementById("ledger-grid-rows");
            if (body) renderLiveDatabaseRows();
            mountCompletenessEngineWidget("comp-widget-target");
        });
        eventBus.on("notification:success", (m) => showToastMessage(m, "bg-emerald-600"));

        // System Master Initialization Boot Hook Sequence
        window.addEventListener("load", () => {
            initLayoutShell();
            initializeAuthentication((firebaseUserObject) => {
                firebaseService.init();
                loadContextModuleWorkspace();
            });
        });

    </script>
</body>
</html>
